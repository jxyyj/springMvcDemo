# 应用服务 WEB 访问端口
server:
  port: 8080

# 数据库配置
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mybatis?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      # 初始化连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 5
      # 最大连接池数量
      max-active: 20
      # 获取连接等待超时时间
      max-wait: 60000
      # 检测间隔
      time-between-eviction-runs-millis: 60000
      # 最小生存时间
      min-evictable-idle-time-millis: 300000
      # 验证查询
      validation-query: SELECT 1
      # 申请连接时检测
      test-while-idle: true
      # 获取连接时检测
      test-on-borrow: false
      # 归还连接时检测
      test-on-return: false
      # 开启PSCache
      pool-prepared-statements: true
      # 每个连接最大PSCache数量
      max-pool-prepared-statement-per-connection-size: 20
      # 监控统计
      filters: stat,wall
      # Web监控
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        # 禁用HTML页面上的"Reset All"功能
        reset-enable: false
        # 设置登录用户名和密码
        login-username: admin
        login-password: admin

# MyBatis配置
mybatis:
  # 指定Mybatis的Mapper文件
  mapper-locations: classpath:mapper/*xml
  # 指定Mybatis的实体目录
  type-aliases-package: com.yyj.springmvc.entity
  # 开启驼峰命名转换
  configuration:
    map-underscore-to-camel-case: true

# 日志配置
logging:
  level:
    com.yyj.springmvc.mapper: debug
